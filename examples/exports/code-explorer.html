, {"code_id": "8ea35f8aa5404f70b3601cc927cfb1b3", "name": "naming_and_identity", "description": "Name meaning, pronunciation, and preserving identity across languages and migration", "status": "active", "annotation_count": 2, "document_count": 1, "display_color": "hsl(138 68% 52%)", "aliases": []}, {"code_id": "fd29b87b2beb454d92c4f8f3d235c2c0", "name": "pre_revolution_modernity", "description": "Memories of Tehran under the Shah as modern, cosmopolitan, and globally connected", "status": "active", "annotation_count": 2, "document_count": 2, "display_color": "hsl(147 68% 52%)", "aliases": []}, {"code_id": "cb68aff92f53444893892b7a22356b99", "name": "arranged_marriage_constraint", "description": "Family pressure, limited agency, and arranged marriage shaping life choices", "status": "active", "annotation_count": 1, "document_count": 1, "display_color": "hsl(355 68% 52%)", "aliases": []}, {"code_id": "7fb3fa2070824da79f2065ce17cad6a5", "name": "single_motherhood_and_family_loss", "description": "Parenting after separation and the emotional cost of father absence", "status": "active", "annotation_count": 1, "document_count": 1, "display_color": "hsl(331 68% 52%)", "aliases": []}], "snippets": [{"annotation_id": "e846f9ac886f40bc9171964c2567b856", "code_id": "cb68aff92f53444893892b7a22356b99", "code_name": "arranged_marriage_constraint", "code_color": "hsl(355 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 108, "end_line": 126, "anchor_status": "clean", "memo": "Arranged marriage and limited agency in the decision to marry and migrate", "exact_text": "[03:25] POURAN KHAVAR: Well, how did you meet my dad?\n\n[03:29] AGGIE EBRAHIMI BAZAZ: I married your dad. I didn't meet your dad. It was arranged marriage which was between my dad and his mom. They were co workers, they were colleagues and they were introduced to each other. And there was a mediator, one of the other teachers. So they. He was studying in US and wanted to marry someone from Iran and bring her over here. And they decided that since my dad was a very honorable man, they thought that probably his, the other would be the best suited for him. So that's how they chose each other.\n\n[04:23] POURAN KHAVAR: Did, did you speak English?\n\n[04:25] AGGIE EBRAHIMI BAZAZ: At the time, not even a war.\n\n[04:27] POURAN KHAVAR: So when you had a dream of being a translator, you didn't yet speak English?\n\n[04:31] AGGIE EBRAHIMI BAZAZ: No.\n\n[04:32] POURAN KHAVAR: So when you knew that you could travel to the US with your husband, potential husband, did that excite you?\n\n[04:39] AGGIE EBRAHIMI BAZAZ: No, it didn't. Because I really didn't want to leave my friends, my country. I beg them not to send me until I at least finish some of the studies that I starting to continue. But my dad said that no, you have to. If you get. If you are married, you have to go, you cannot stay here, you have to be with her over there. So I rather to stay another year and enjoyed myself, my friends and I really didn't want to leave Iran.\n\n[05:19] POURAN KHAVAR: But so what? Why did you?\n\n[05:22] AGGIE EBRAHIMI BAZAZ: I had to. I was. I was pushed. I was chosen or my husband was chosen for me. We got married and in matter of a week, your dad came from here. We met once to. For him to see me and I see him. And then after that we met two other times. Once with the chaperone was his sister, even to a movie. They talked and laughed and everything. And I was sitting over there, I didn't understand what they're talking about. And then another time we went shopping and then we were married. So.\n"}, {"annotation_id": "c14c33d6ed4c46378e44bae2b7f44350", "code_id": "593b77a85a5645df8630f7d3e5e79a27", "code_name": "educational_aspiration_translation", "code_color": "hsl(72 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 33, "end_line": 51, "anchor_status": "clean", "memo": "Strong educational orientation, influential teachers, and professional aspiration toward helping children", "exact_text": "[08:09] KATHY PURNELL: Wow. All right. Well, I mean, it sounds like even if you weren't a morning person and may not have enjoyed being woken up to go to school, it did sound like you were an avid reader, a passionate reader. I mean, it takes a lot of work to create that nook reading book. So did you enjoy school? I mean, even if it took, you know, a bit, even if it's not part of your perfect day, did you enjoy school? Look, and what kind of student were you?\n\n[08:33] BITA EDRAKI: I was a good student. I had to be a good student because education was important to my family. And I also, it was difficult in iranian, ok. And schools were very regimented. But I would find joy in that through my friend. I was popular in school, had a large group of friends that we would hang out, we would study afterwards together. I remember in Iran we had the equivalent of an SAT from fifth grade. We had to pass that test of what you have learned from first grade to fifth grade to be able to advance the 6th grade, to go to middle school. And I remember studying with my friends. And then after taking it, going out to lunch together at a restaurant to celebrate the fact that we were able to take this test and we felt comfortable taking it. The subject was there. Yeah, go ahead.\n\n[09:54] KATHY PURNELL: Oh, God. No, I'm sorry. Go ahead.\n\n[09:56] BITA EDRAKI: So subjects in school that I always loved was I loved science and history and geography. And usually I can say that was because those were subjects that I had, teachers that were also very passionate about what they were teaching.\n\n[10:19] KATHY PURNELL: So did. So were there some teachers that still that you remember that that left an impression on you or that had a strong influence on your course of study?\n\n[10:32] BITA EDRAKI: If we're talking about in Iran, yes. There were two teachers that made a huge impression on me. One was my english teacher, actually, she would teach english and iranian literature. And another one was my last year of school that I was. There was my mathematics teacher, which I remember I argued with them, because he was saying that you cannot have more than one line go through, adopt. And I said, oh, no, you can, having missed the previous lesson that a line is formed by, you know, dots. And he allowed me to actually go on the board and explain what I meant, and then he explained how it was not putting people down. So I remember that.\n\n[11:32] KATHY PURNELL: No, that's true. So you said you were popular. How would your classmates. How do you think your classmates remember you, or how would they remember you?\n\n[11:41] BITA EDRAKI: I think they remember me as a kid who was always very inclusive. I would always. They would sometimes get mad at me. I would invite other people into our friend group, and that was because of the way I was brought up. I was always brought up to have a sense of the larger community. It wasn't just about one group of people. It was about all people. I grew up thinking, you know, learning that we are all part of the same member of humanity. No matter what your background, your religion, your culture, your ethnicity, we are all part of the same family.\n\n[12:39] KATHY PURNELL: Okay. And then I. What was. What was the first profession? I mean, I know that that probably has changed over time, but when you were a young girl, what did you want to be? Or what did you think you would end up doing?\n\n[12:53] BITA EDRAKI: My. My goal always was to become a pediatrician, which I never actually. I always loved working with children, and that's what I wanted to become. But I went into early childhood education, and then I studied adolescent psychology and adolescent abnormal psychology, and that's how I became, you know, that was my profession, really. That's what I did.\n"}, {"annotation_id": "289ac7fd4d5245efab49a1d41522004a", "code_id": "593b77a85a5645df8630f7d3e5e79a27", "code_name": "educational_aspiration_translation", "code_color": "hsl(72 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 89, "end_line": 91, "anchor_status": "clean", "memo": "Immigrant school transition followed by accelerated educational achievement in the United States", "exact_text": "[24:13] KATHY PURNELL: So many questions I want to ask you. All right, so did you, did you study in the United States? Like, when did you go to. Yeah. So where did you go to school in the United States?\n\n[24:26] BITA EDRAKI: So I came to. When I came to California, I went to Redwood Middle School, which was actually right behind my house, and I would walk there. It was difficult for me, and I'm going to add this in there, because I'll tie that back into my experiences with working with the refugees, afghan refugees in Kalamazoo. And it was. I was. They had no newcomer program. They had no ESL and English as second language programs. So I was actually put in the program. It's for a special ed program. It was in a trailer, and it was a special ed program. It was very uncomfortable for me, but it was the only place where they could have someone that had come that didn't, was not fluent in English to be given the opportunity to actually take tests and take longer, because back then, we didn't have, you know, Google translate. We had dictionaries that I had to go through to find words that I didn't understand. So that was a difficult transition, but it was a short period of time. And then we moved. I went to high school. I graduated high school in three years because I wanted to learn more. And I took classes at the community college there. I got accepted at UCLA, but I was only. I wasn't even 16 when I got accepted. And my father wasn't sure that moving away from home and going to such a large university would be the best thing for me. So I stayed home, and I went to the community college, West Valley Community College, where I studied early childhood development and French. I remember taking 27 credits one semester and just going, having nine classes in college. I enjoyed it. It was difficult, but I loved it. And then I repeated that I then went to University of California, Irvine, but that's because I got married at a very young age. I met a young gentleman, and we fell in love, and we got married. He was a student at Stanford University. And then we moved to Costa Mesa, where he was now going to work, and I transferred my option. Instead of going to UCLA, I went to UC Irvine.\n"}, {"annotation_id": "a26fbb880c9649c98f09ec55fd3d4401", "code_id": "593b77a85a5645df8630f7d3e5e79a27", "code_name": "educational_aspiration_translation", "code_color": "hsl(72 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 100, "end_line": 102, "anchor_status": "clean", "memo": "Early educational ambition and desire to become a translator", "exact_text": "[02:39] POURAN KHAVAR: When you were going to school, what did you dream of being? What career did you want for yourself?\n\n[02:46] AGGIE EBRAHIMI BAZAZ: Well, I was pursued by my dad to go and study math because in those days after the ninth grade, you would choose a major between three majors of natural science, math and literature. But I always knew that I like literature so I wanted to do something in that field. But my dream job then was to become a translator.\n"}, {"annotation_id": "2acc34993d434b24b1851b0ce1313e81", "code_id": "593b77a85a5645df8630f7d3e5e79a27", "code_name": "educational_aspiration_translation", "code_color": "hsl(72 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 278, "end_line": 282, "anchor_status": "clean", "memo": "Blocked teaching career in Iran but eventual realization of translation work in Iran and the US", "exact_text": "[35:29] AGGIE EBRAHIMI BAZAZ: With excellence. And then one day I was waiting for you guys to come home with your dad with food. Somebody knocked at the door, and the guy with the motorcycle came to see how I dress at home and where's my house and what we do at home. And when I opened the door without scarves, with the short sleeves, and he said that you passed with excellence. But you know that teachers are the role model of the children. I said, yeah, yeah. He said, do you think you're a law mother? I said, I can't be. And he said, no, you can't. Look at yourself. Look at the way you dress. You cannot be a role model. And furthermore, what you have studied is no good in Iran. You studied sociology, and sociology, you studied United States society, not Iran society. So you can teach in Iran. So I knew that this is a country that they left us, so I wanted to leave.\n\n[36:36] POURAN KHAVAR: When you came to the U.S. did you ever fulfill your dream of being a translator?\n\n[36:41] AGGIE EBRAHIMI BAZAZ: I fulfilled my dream when I was in Iran. I translated two books. I worked in the magazine, a weekly magazine of the most popular women magazine in Iran, Today's Women. And I was hired by them, worked there for a few years, and then also here I did translate for the county courthouse for Iranians and Afghanians who do not speak English.\n"}, {"annotation_id": "30af411ca76b49d6a2466c68cc7b4b34", "code_id": "e22c570d765745f899ecf5798c44c66c", "code_name": "faith_guided_service", "code_color": "hsl(177 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 121, "end_line": 127, "anchor_status": "clean", "memo": "Faith and migration experience motivate refugee support and practical service", "exact_text": "[31:55] KATHY PURNELL: No. Wonderful. And so I know your heart is in a lot of things. I mean, and thank you for sharing, because I was going to ask, like, where is home to you? And you answered that. And I know that you're very passionate about your work now, which is helping a lot of afghan evacuees in our community, and you've done a tremendous amount of work helping that process. Say more about that work and why it's important to you, and why did you say yes to that work?\n\n[32:30] BITA EDRAKI: So I started when I learned that there was a large group of afghan refugees coming and knowing that I could help with at least communication with a group of them, because I speak Farsi, and that is a dialect of Farsi, which is spoken in Afghanistan. The two main languages are Pashtu, which I do not speak. I've learned some words, and Dari, and I could communicate with them. So I thought, having gone through that experience of knowing that if there is someone that you can communicate with, that could make things easier. That's how I started. Both John and I speak Farsi. And I thought, what a wonderful way to be able to help people that had to leave in a very different circumstance than I did. You know, I had to. Time to come. I came here knowing that we were leaving Iran. These families, some were given 24 hours to pack and go to the airport in Kabul to be evacuated. How traumatic of an experience that must have been for them. And I thought, if I can provide some sense of comfort for them, that's what my job and I got to start. At first, I started working with one family. One family turned into another family, then another family, another family. Before I would, we were working with over 80 individuals and trying to take care of all of journey and to actually have a sense of belonging, which is very difficult to have when you have been uprooted so abruptly.\n\n[34:31] KATHY PURNELL: So you mentioned throughout the interview kind of how a big part of a sense of belonging that you feel is tied to your faith being baha'I and somehow finding the other Baha'is in the Baha'I community wherever you go. Yeah, maybe tell us a little bit more, because some of the listeners may not be familiar with kind of the core tenants that animate you and why I. What does it mean to you to be baha'I? Yeah. And how does that kind of influence how you engage with others?\n\n[35:06] BITA EDRAKI: So to be Baha'I, for me, is to be a world citizen. It's a world citizen. I belong to the human race. I am part of the human race. And it's what happens in one part of the world affects everybody else. The principal tenants of the Baha'I faith are unity of mankind. And that has animated again, as you said, that is who I am. That is, I think maybe from my early childhood where you ask, what did my friends think of me? And I was the one person that was inclusive. I brought everybody else. I remember getting in trouble because I actually fought with someone because they were harassing someone that had a disability, and I got in trouble because I shouldn't have done that. But I pushed them away, physically pushed them away from the child they were beating. And baha'I believe in. I know we have very limited time, so I don't know.\n"}, {"annotation_id": "09efbdf72d5348a9b4f925b6e78ee798", "code_id": "e22c570d765745f899ecf5798c44c66c", "code_name": "faith_guided_service", "code_color": "hsl(177 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 125, "end_line": 139, "anchor_status": "clean", "memo": "Bahai worldview frames inclusion, unity of mankind, and ethical obligation to others", "exact_text": "[34:31] KATHY PURNELL: So you mentioned throughout the interview kind of how a big part of a sense of belonging that you feel is tied to your faith being baha'I and somehow finding the other Baha'is in the Baha'I community wherever you go. Yeah, maybe tell us a little bit more, because some of the listeners may not be familiar with kind of the core tenants that animate you and why I. What does it mean to you to be baha'I? Yeah. And how does that kind of influence how you engage with others?\n\n[35:06] BITA EDRAKI: So to be Baha'I, for me, is to be a world citizen. It's a world citizen. I belong to the human race. I am part of the human race. And it's what happens in one part of the world affects everybody else. The principal tenants of the Baha'I faith are unity of mankind. And that has animated again, as you said, that is who I am. That is, I think maybe from my early childhood where you ask, what did my friends think of me? And I was the one person that was inclusive. I brought everybody else. I remember getting in trouble because I actually fought with someone because they were harassing someone that had a disability, and I got in trouble because I shouldn't have done that. But I pushed them away, physically pushed them away from the child they were beating. And baha'I believe in. I know we have very limited time, so I don't know.\n\n[36:21] KATHY PURNELL: No, but that thing. But, no, but this, this. I mean, that, that actually, that helps a lot in terms of the. The unity of mankind and. And kind of the. The kind of the foundational belief in kind of humanity.\n\n[36:35] BITA EDRAKI: Right.\n\n[36:36] KATHY PURNELL: And.\n\n[36:36] BITA EDRAKI: Yeah.\n\n[36:37] KATHY PURNELL: And how that. Yeah, but go ahead. Yeah.\n\n[36:41] BITA EDRAKI: A progressive revelation that we are part of the same creation. It is that we are just, we develop and evolve as time goes by and as our spiritual needs will grow, as so do our social needs and demands.\n"}, {"annotation_id": "25074bb9476c4787afb3e56ad5ba5a5f", "code_id": "66489fcb92c44431912bcc5cf4d7e7ef", "code_name": "family_and_community_belonging", "code_color": "hsl(327 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 11, "end_line": 15, "anchor_status": "clean", "memo": "Early belonging rooted in extended family gatherings and shared childhood life", "exact_text": "[03:03] BITA EDRAKI: Well, I lived in Iran during the heydays of Iran and pre revolution I had. And it's, you know, I lived in a middle class family that was a very loving and caring family where education and connectedness was of utmost importance, not only to my mom and dad and my brother, but to my extended family, my grandmother, my aunts, my uncles, my cousins. And we all grew up together.\n\n[03:48] KATHY PURNELL: And what was. What's. What's your earliest memory of growing up?\n\n[03:54] BITA EDRAKI: Not easy to answer. So my. I have many fond memories of growing up again. It's always centered around family get togethers. My brother and I obviously always getting into mischief together. We were 16 months apart. He's 16 months older than I am. And being excited about going to grandma's home because we knew everyone will be there. And we would get together with our cousins. I remember we would all pile up in one car. We refused to go in separate cars. And back then, there were laws of, you have to have seatbelts on. It would be 15. We were proud to say that there were 15 of us in Volkswagen Beetle, that we could then go far to grandma's house. So there was sense of, uh, being connected.\n"}, {"annotation_id": "fb47e1037f204cb4adbfa0690dfd5313", "code_id": "66489fcb92c44431912bcc5cf4d7e7ef", "code_name": "family_and_community_belonging", "code_color": "hsl(327 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 61, "end_line": 67, "anchor_status": "clean", "memo": "Migration initially experienced as rupture from family, friends, and home", "exact_text": "[18:04] KATHY PURNELL: How did you feel when you first. So how did you feel when you first heard the news? I mean, when your father confided in you and told you that you would probably be living in the US or Canada?\n\n[18:17] BITA EDRAKI: I told him, he can go and they can go, and I'll stay with my grandma. And I was told that that was not an option. I was not happy. I didn't want to leave my family and my friends. I had a very, very close relationship with my grandmother and my uncles and cousins and the neighbors, the kids that we would spend all of our times with. You know, being a preteen, it was a daunting idea of having to give up and all of that and going to an unknown place. Even though my father had brought my brother and I to California, I believe it was in 1974 that we went and visited the United States for the first time. But it was different. I knew I was going back home.\n\n[19:21] KATHY PURNELL: So what was, what were your first impressions of San Francisco, either in the initial trip you made or when you first settled in San Francisco?\n\n[19:32] BITA EDRAKI: My first impression was, it's a beautiful place. That was when we first came. And, of course, did you know all of the nice places, places that we wanted to go and visit? I remember all of that Monterey, Monterey Aquarium, all of those places that we went and visited. You know what, though? It wasn't home, it was a place. And then when we moved there, it was difficult for me. It was December at the, you know, first week of December. So we signed up for school, and they told us it's best to start after the Christmas holiday. So it was. I missed my family, I missed my friends. My first impression was, it's a, you know, it's a place for other people, maybe not me.\n"}, {"annotation_id": "96782dbac1c04f1faffaf351073853f8", "code_id": "66489fcb92c44431912bcc5cf4d7e7ef", "code_name": "family_and_community_belonging", "code_color": "hsl(327 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 81, "end_line": 83, "anchor_status": "clean", "memo": "Belonging in California formed through family life and Bahai gatherings after the revolution", "exact_text": "[22:17] KATHY PURNELL: So. Okay. So then what do you miss about Saratoga? What did you love the most about it? Or what did you miss? What do you miss the most about it?\n\n[22:28] BITA EDRAKI: I think it was when, again, it was the time that I found another home. It became home, of course, the weather in California, it's loved that. I loved the fact that I lived with my mom, dad and brother it was that sense of family. Back then, we had a beautiful home that was the center of. So once the iranian revolution happened, as you all know, it was a huge brain drain on Iran. Everybody that could immediately left. And there was a large population that came to the northern California Bay area. Again, as I mentioned, I am a Baha'I, and the Baha'I community sort of gelled together and supported each other in that respect. I remember having gatherings at our house every Friday night where it started with a few people. By the time I left in 1983, Washington, we had 70 people that would come every night and would gather together, and it would be. People would cook and, you know, they had a sense of belonging and a family. So that family was created.\n"}, {"annotation_id": "f405f1081a184ec08f8c2396ac844cf5", "code_id": "66489fcb92c44431912bcc5cf4d7e7ef", "code_name": "family_and_community_belonging", "code_color": "hsl(327 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 141, "end_line": 151, "anchor_status": "clean", "memo": "Kindness, community support, and reciprocal belonging become the model for welcoming others", "exact_text": "[37:03] KATHY PURNELL: So can you tell me about a moment when a person's kindness made a key difference in your life?\n\n[37:21] BITA EDRAKI: That's a difficult question to answer, Cathy. There has been so many of those moments throughout my entire life, having, wherever I go and having moved so many times, living away from my family is creating those close bonds of friendship where in Richfield, my door was rarely locked and my friends would come, knock on the door, open the door and come in, and they wore my family. During the time of my late husband's illness, everybody came together and they helped. It was, I never felt alone. It was wherever I went, had people there. And maybe that's why working with these afghan refugees is so important to me, is I want them to know that they're not alone. They belong to a community that to welcome them.\n\n[38:31] KATHY PURNELL: So what are some of your thoughts about how we as a community. So now that Kalamazoo is home to you now, what do you feel that Kalamazoo could and should do to become home that welcomes everyone that is more inclusive?\n\n[38:50] BITA EDRAKI: So, George, part of it is to get to know who's coming into Europe. It's a two way street. Not only do they have to get to know us, we have to get to know them. We have to understand what their needs are. It's not giving people what we believe we want to give to people really listening and hearing. What is it that they need? What is it that they're. They want? So for anything within belong to a community, you always need to have financial support, the language support, and that cultural transition support. Again, it's for both sides of it. How can we emotionally connect to these people and how can they have that emotional connection to us? So I can give you an example, is to provide programs for the children that they can partake of. YMCA of Kalamazoo is great. We were able to get kids registered and have the fees waived for them when they first came. And we were so excited. Okay, we got YMCA memberships for all these kids. Get them there once they get. How do you get them there? Transportation. Okay, so it's not just how do they get there. How do they sign up for these programs that we can go? How do they sign up for classes? There's so many small details that we forget. So one of the things that Kalamazoo has done, and I feel that it's remarkable. And that's why I said when I first came, I was put in education in Kalamazoo, they have the newcomers program where some of them, the very, very first time in their life, are actually going to school. They were able to get them buses that would come and take them. And the love that they experienced from their teachers, they want to go to school. They're excited about that. I work and talk to the girls that for the first time they have this notion that they can become their own person, they can actually study. Some are talking about wanting to become teachers, educators, and, you know, one wants to become a physician. These opportunities they would have never had in Afghanistan. Again, that ties back to my religion, which is the equality of men and women is one of the core principles in the Baha'I faith. There's actually, if you have enough money to only educate one member of your family as a baha'I, you're supposed to educate the woman, the girl first, because they become the future educators of your family. So to see that and to witness that these girls are blossoming, not just girls, but the boys as well, it's, that's what gets me excited. That's why I love and continue working with them.\n\n[42:13] KATHY PURNELL: No, I absolutely can. I mean, just hearing your voice through this interview is really, and I'm so grateful that you took the time to do this. The idea of, like, kind of what animates you both. Your faith in the sense that you don't want anyone to feel alone, right, to remind everyone that they have a place and they belong and should flourish and should dream and flourish. So, Peter, thank you so much for taking the time to do this. I know that you're traveling, and because you have, like, a deep love of your family, which is now, like outside of Michigan, you're traveling. It's even more special. And I really appreciate you taking the time to do this.\n\n[42:56] BITA EDRAKI: Well, Cathy, thank you for even thinking about me. I think at first I said to you, why me? You know, there's so many other people that you could interview. But I thank you for giving me the opportunity to tell you my story of how I came to United States and then to find United States home again and hoping that we can, as a community within Kalamazoo, make kalamazoo, make United States and the world home by, you know, we. For me also, I'll close with this, is that sometimes I get upset with what is happening in the world in general, and I feel so helpless because I can't make the world a better place. What I can do is help my micro environment, maybe improve the lives of a few individuals within my micro environment that then can have larger impact on the world, you know, with its grassroots efforts. So thank you for giving me the time and the opportunity.\n"}, {"annotation_id": "ab7e9eb58eb74730a80f27d648ac7e7d", "code_id": "7233096630a4482c950a5c501d54138b", "code_name": "gendered_social_constraint", "code_color": "hsl(290 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 145, "end_line": 147, "anchor_status": "clean", "memo": "Education for girls and women is framed as a core principle and a denied opportunity in Afghanistan", "exact_text": "[38:31] KATHY PURNELL: So what are some of your thoughts about how we as a community. So now that Kalamazoo is home to you now, what do you feel that Kalamazoo could and should do to become home that welcomes everyone that is more inclusive?\n\n[38:50] BITA EDRAKI: So, George, part of it is to get to know who's coming into Europe. It's a two way street. Not only do they have to get to know us, we have to get to know them. We have to understand what their needs are. It's not giving people what we believe we want to give to people really listening and hearing. What is it that they need? What is it that they're. They want? So for anything within belong to a community, you always need to have financial support, the language support, and that cultural transition support. Again, it's for both sides of it. How can we emotionally connect to these people and how can they have that emotional connection to us? So I can give you an example, is to provide programs for the children that they can partake of. YMCA of Kalamazoo is great. We were able to get kids registered and have the fees waived for them when they first came. And we were so excited. Okay, we got YMCA memberships for all these kids. Get them there once they get. How do you get them there? Transportation. Okay, so it's not just how do they get there. How do they sign up for these programs that we can go? How do they sign up for classes? There's so many small details that we forget. So one of the things that Kalamazoo has done, and I feel that it's remarkable. And that's why I said when I first came, I was put in education in Kalamazoo, they have the newcomers program where some of them, the very, very first time in their life, are actually going to school. They were able to get them buses that would come and take them. And the love that they experienced from their teachers, they want to go to school. They're excited about that. I work and talk to the girls that for the first time they have this notion that they can become their own person, they can actually study. Some are talking about wanting to become teachers, educators, and, you know, one wants to become a physician. These opportunities they would have never had in Afghanistan. Again, that ties back to my religion, which is the equality of men and women is one of the core principles in the Baha'I faith. There's actually, if you have enough money to only educate one member of your family as a baha'I, you're supposed to educate the woman, the girl first, because they become the future educators of your family. So to see that and to witness that these girls are blossoming, not just girls, but the boys as well, it's, that's what gets me excited. That's why I love and continue working with them.\n"}, {"annotation_id": "1dd0cbe929914ad68c5a6083f9aabc25", "code_id": "7233096630a4482c950a5c501d54138b", "code_name": "gendered_social_constraint", "code_color": "hsl(290 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 166, "end_line": 170, "anchor_status": "clean", "memo": "Concern that a daughters acceptance and future are constrained by patriarchy", "exact_text": "[08:42] AGGIE EBRAHIMI BAZAZ: I pray to have a daughter. But when I was pregnant with you, we were living back home in Iran and culture and the environment and the society, everything is nothing that you see here. So it's totally different. Everything is elevated toward the religion and the traditions and the customs and superstitious and all this because they changed it. The government, the new Islamic government changed everything to the back to 1400 years back. So we moved backward for so everything now was, it was so, so, so difficult for a girl to be raised in Iran, in Iran's society. And given all the facts that I had seen and I had experienced in my life with your dad and his family, I knew that if I have a girl, it has to be certain kind of girl for them to accept her. And otherwise they rather, they all rather to have a son. And you know, first of all, your dad didn't want anymore, I mean, didn't want a baby, another child. But I was, I wanted what I wanted and so what I prayed for, like always the first thing would be to be happy, I mean to be healthy. Because I've seen so many cases that kids were born with defects and diseases. And then I wanted a girl that have a great future, not like us women in Iran. And of course I wanted, I gave God a blueprint of what I wanted. Like I want my daughter to be like this with the blonde hair, white complexion, small mouth and cheeks and all to be beautiful. So they would accept her as a, as a child and as their family. And I got what I wanted.\n\n[11:08] POURAN KHAVAR: So did they accept me?\n\n[11:11] AGGIE EBRAHIMI BAZAZ: They did, the very first minute. Their approval always was like, oh, how pretty she is. That would be their stamp of approval from my father's side, right, from the father's side, whatever. And probably my father's side too. My father, not my side, but my father's side. And male chauvinistic is in our society, it is. And they look at women all the women as their vanity. They look at their vanity. They don't look at what the future would hold for them. What can we do for them? What, how can we support them? So the first thing, your grandmother, your dad's mom said that she looks like an angel. And your dad was so happy that he ran and called his girlfriend to tell him that he had a very beautiful girl, his girlfriend.\n"}, {"annotation_id": "07b3753db2014f3f887a93ce039f35be", "code_id": "7233096630a4482c950a5c501d54138b", "code_name": "gendered_social_constraint", "code_color": "hsl(290 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 180, "end_line": 182, "anchor_status": "clean", "memo": "Explicit account of womens dependency on men and restricted opportunities in Iran", "exact_text": "[17:31] POURAN KHAVAR: So I think you already answered this, but could you just say again briefly, what were some of your fears about having a new baby and that new society?\n\n[17:41] AGGIE EBRAHIMI BAZAZ: They're raising a daughter in a society that everything is dependent on men. They can travel, they can get married, they can't go to school, they can't go to their family members houses if their husband don't let them. They can be free to do whatever their dreams are. They can't. They have limited resources. They have. So it was even for boys. It was even same thing for boys. The universities were closed, schools were so one dimensional and it was just, I want to say hell, but it was. No one in 21st century should live like that. Especially a country that sits on black gold and has 2500 years of civilizations. And we have came all this way with Shaw, especially the last 50 years to reach to that point that Carter, Jimmy Carter called Iran a month before revolution. He called Iran the island of stability. And then all of a sudden everything changed. So Khomeini said when he was in Neufelay Chateau. He said, I'm not going to interfere with the state. I'm going to go to com and be a preacher, be a clergyman. But no, when he came to Iran, he wanted everything. They started executing all the military generals. They executed everybody. They would kill people in the middle of the road. So I knew that this is not the place I want to raise the families. So it was. I was really weary of the fact that I'm going to have a daughter raised in that society. But many, many people have. So I was one of them too.\n"}, {"annotation_id": "bee51b487e844cecaea2af3a3e486686", "code_id": "7df2f4b955b44e929ed5b8c5288d9626", "code_name": "migration_and_resettlement", "code_color": "hsl(6 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 53, "end_line": 67, "anchor_status": "clean", "memo": "Family migration decision driven by instability, persecution risk, and educational opportunity", "exact_text": "[13:31] KATHY PURNELL: All right, so, okay, so then I know that because I've had the good fortune to meet you here in the United States and Michigan. You mentioned that when you traveled to. When you came to the United States, you lived in many different cities. So let's talk about why the United States, like, what happened? How did you end up, and why did you come to the United States?\n\n[13:55] BITA EDRAKI: So I remember the exact date. It was December 6, 1976, that we came to United. My father worked for the Ministry of Agriculture in, and he was a very stooped man, was also a lifelong learner. He always, one of his advices to me was, Bita the day you stop learning is the day you need to die. And it didn't matter what it was. And I asked him. I asked him to explain what he meant by that and said, it doesn't matter. It can be a simple thing. It can be a new word. It can be a recipe, it can be a fact, but always, always learn. And being that's how you grow. So he sensed that what creates a safe home and an environment, a stable home, is crumbling within Iran, that opportunities will not be easily attained. I grew up in a Baha'I household. My religion is a Baha'I, and that Baha'is war and continue to be persecuted in Iran. He told me, my brother, that he wants us to always have the opportunity to pursue higher education and to be able to live and be so. I remember the day he came and announced that he is going to apply for permanent in either in California, I mean, in United States or Canada. And that was whom, whichever country would reply first was where we were going to go. And United States happened to respond to his application. I think it was a week or two weeks before the canadian embassy set that. So that's how we became. We came to come to United States. We were very fortunate that when we came to United States, we came with a permanent residency. And it was. We chose San Francisco because my father had a colleague that used to work for FMC Corporation, which, from my recollection, was an agricultural company. I remember them having agricultural machinery and chemicals. And Peter, back then, told my father that you guys can come here and you can use California, San Francisco, or Bay Area as a bridge as to wherever you want to move. But having their family and knowing their family and having that support system where they truly welcomed us and came and greeted us at the airport and had gotten a hotel for us for a month, we stayed in a hotel until we figured out need to go. But having that guidance from them was crucial in finding our way. I don't know, Cathy, if I went a roundabout way of answering your question, or whether the question was answered, but that's how we came to United States. That was the decision that was made for our family by my father to come.\n\n[17:53] KATHY PURNELL: And how old were you? How old were you when you came?\n\n[17:56] BITA EDRAKI: I was 1212. And so was I coming? Absolutely not.\n\n[18:04] KATHY PURNELL: How did you feel when you first. So how did you feel when you first heard the news? I mean, when your father confided in you and told you that you would probably be living in the US or Canada?\n\n[18:17] BITA EDRAKI: I told him, he can go and they can go, and I'll stay with my grandma. And I was told that that was not an option. I was not happy. I didn't want to leave my family and my friends. I had a very, very close relationship with my grandmother and my uncles and cousins and the neighbors, the kids that we would spend all of our times with. You know, being a preteen, it was a daunting idea of having to give up and all of that and going to an unknown place. Even though my father had brought my brother and I to California, I believe it was in 1974 that we went and visited the United States for the first time. But it was different. I knew I was going back home.\n\n[19:21] KATHY PURNELL: So what was, what were your first impressions of San Francisco, either in the initial trip you made or when you first settled in San Francisco?\n\n[19:32] BITA EDRAKI: My first impression was, it's a beautiful place. That was when we first came. And, of course, did you know all of the nice places, places that we wanted to go and visit? I remember all of that Monterey, Monterey Aquarium, all of those places that we went and visited. You know what, though? It wasn't home, it was a place. And then when we moved there, it was difficult for me. It was December at the, you know, first week of December. So we signed up for school, and they told us it's best to start after the Christmas holiday. So it was. I missed my family, I missed my friends. My first impression was, it's a, you know, it's a place for other people, maybe not me.\n"}, {"annotation_id": "87d5ac5814dc4f5fb7b891e3368fd1be", "code_id": "7df2f4b955b44e929ed5b8c5288d9626", "code_name": "migration_and_resettlement", "code_color": "hsl(6 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 97, "end_line": 119, "anchor_status": "clean", "memo": "Serial moves across the US and eventual relocation to Kalamazoo through grief, remarriage, and family obligation", "exact_text": "[27:48] KATHY PURNELL: Okay, so where did you move to? Maybe.\n\n[27:55] BITA EDRAKI: Yeah, within California. We moved to different cities. So it was Costa Mesa, then Irvine, then Laguna Niguel, and then from there, we moved to upstate New York, to Ithaca, New York for college, for Cornell, where Michael went for his business administration. He got an MBA from there. And I actually was working for the city of Ithaca. And I worked with their youth program, where I supervised programs for adolescents and young adults with special needs.\n\n[28:40] KATHY PURNELL: How long did you live in Ithaca?\n\n[28:43] BITA EDRAKI: Two very long years.\n\n[28:46] KATHY PURNELL: Why do you say that?\n\n[28:50] BITA EDRAKI: It seems like this is a pattern for me. I moved from southern California, Laguna Niguel, where I complained about how having the sea mist and dew on my car every morning that I got up to go to work, to moving to Ithaca, New York, and having to live through the winters. The bitter, bitter winters in Ithaca.\n\n[29:09] KATHY PURNELL: Yeah. No, they are. They are very cold. To know that.\n\n[29:15] BITA EDRAKI: And it was difficult. Living in Ithaca was not an easy time for me, but I managed again. Part of it is that sense of belonging and community. Wherever I have moved, there has been a baha'I community that we somehow find and find some support for each other, and that's what it was. But I was very eager to move out of Ithaca once Michael graduated, and we did.\n\n[29:43] KATHY PURNELL: Where did you then move to or settle after that?\n\n[29:46] BITA EDRAKI: We moved to Indiana for one year, southern Indiana. And then after that, we moved to Connecticut. So Connecticut was home for me for a long time. I lived in Richfield, Connecticut, for almost 24 years. That's where my kids grew up. That's where my kids were born, and that's where they grew up.\n\n[30:10] KATHY PURNELL: So given all of the different places, we haven't even got. Oh, wow. We haven't even gotten to. I know we're good. So we haven't even gone to Kalamazoo. How did you. How did you get. Why did you decide to move to Michigan? How did you end up in Michigan?\n\n[30:28] BITA EDRAKI: So my first husband, Michael, passed away about 1213 years ago. And after that, I was in Connecticut still, but I went back to California to be with my mom and take care of my mom for a while. And my mom, unfortunately, passed away. After that, I had an opportunity to live in southern California for a few years, where I reconnected with my current husband, who happened to be a very, very dear friend of mine. And we got married in the midst of the pandemic, and we were supposed to live in southern California, but John had to come back to Kalamazoo, where Kalamazoo was home for him and because of family obligations. And he was supposed to be there for a short time, but it turned out that he was there for longer than what we anticipated. And I realized that home is where my heart is, and my heart was with my husband, and he was in Kalamazoo. So I resigned from my job and I moved to Kalamazoo, Michigan, which, again, was not a very easy transition because I moved from southern California, Carlsbad area, in the midst of the pandemic the day before your polar vortex hit in Michigan, to Kalamazoo, Michigan. That's how Kalamazoo became home for me.\n"}, {"annotation_id": "63c9ce58b8f4401185b1cb5d83ef8cf8", "code_id": "7df2f4b955b44e929ed5b8c5288d9626", "code_name": "migration_and_resettlement", "code_color": "hsl(6 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 200, "end_line": 206, "anchor_status": "clean", "memo": "Decision to leave Iran and return to the United States with the children", "exact_text": "[23:52] POURAN KHAVAR: So yeah, it's a beautiful name. Well, tell me about. So you were in Iran at the time and then how old was I when eventually you moved back to the United states?\n\n[24:05] AGGIE EBRAHIMI BAZAZ: I was 28 when I had you. I was 28 when your dad left. I mean mentally left. I fought and I struggled for a few years to have them come back and so my children would have both parents. It didn't work. So I decided that I'm not going to stay there to witness all the miseries and I have to go back. So I came back 1988, when you were seven, before you, your seventh birthday, I took you and your brother and I moved back to States.\n\n[24:52] POURAN KHAVAR: So who moved back with you? How many people?\n\n[24:55] AGGIE EBRAHIMI BAZAZ: You, your brother and myself.\n"}, {"annotation_id": "b3a45c3fe98e4436bbea95df0dc68618", "code_id": "7df2f4b955b44e929ed5b8c5288d9626", "code_name": "migration_and_resettlement", "code_color": "hsl(6 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 240, "end_line": 254, "anchor_status": "clean", "memo": "Migration memory, choosing Atlanta, and ambivalence about resettlement", "exact_text": "[28:24] POURAN KHAVAR: Do you have a specific memory about traveling to the US with my brother and I?\n\n[28:32] AGGIE EBRAHIMI BAZAZ: Yeah. One thing that I remember is that your brother did not speak even one word. It is. It is 18 hours flight from Tehran to New York. And all this time he looked so sad and he was so isolated. He isolated himself from me and you and everybody and didn't even say a word. Either slept or just looked sad. I remember that. I don't know, I never found out he didn't want to come or. But he's happy he's here. He wanted, I think he always says that his best thing happened, but I don't, I didn't feel it. I didn't feel it then, so.\n\n[29:22] POURAN KHAVAR: But now he's happy he's in New York. Why did you choose Atlanta and not New York?\n\n[29:29] AGGIE EBRAHIMI BAZAZ: You have to have somewhere, somewhere to land. I didn't know anybody in New York. I had family in California and you guys had a family in California, but I didn't want to go to them because they were all your father's family. And my family in most of them didn't know I was divorced. So my, I just knew that I have to leave Iran. That's the one thing that was certain. I had a friend, high school friend that I helped her to come to states when I was in Las Vegas and now she was in Atlanta and I joined her.\n\n[30:06] POURAN KHAVAR: We get daddy. Oh, that's it. She was at Atlanta and you joined her here. Are you glad you chose Atlanta?\n\n[30:15] AGGIE EBRAHIMI BAZAZ: No.\n\n[30:16] POURAN KHAVAR: You're not?\n\n[30:18] AGGIE EBRAHIMI BAZAZ: No. I don't, I don't know what, but I think I should have gone to a city like, closer to where I was born, like Tehran. But it was only option I had so I came here and it has been our home for past 33 years, 32 years. So yeah, I think it's home. I won't change it for Iran, but it is home.\n"}, {"annotation_id": "cb620becf17444b2bdad3025d8d878a7", "code_id": "7df2f4b955b44e929ed5b8c5288d9626", "code_name": "migration_and_resettlement", "code_color": "hsl(6 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 272, "end_line": 278, "anchor_status": "clean", "memo": "Retrospective justification for leaving Iran and comparison between life trajectories there and in the US", "exact_text": "[33:40] POURAN KHAVAR: Are you glad you brought us here?\n\n[33:42] AGGIE EBRAHIMI BAZAZ: I sure am. I am. Because we wouldn't survive in Iran. There were so many things working against us, and now it's working against everybody else. Everybody wants to leave Iran, and that is why migration is so high in Iran. If they can leave, they would leave. But other than that, my family situation in Iran, you guys, is everything. Everything. People, neighbors, families, work, job, everything was not the way I wanted. Schools. Like, I remember one day I went to school and they. Ali was in grade school and they said that. They called me in school and they said that, oh, your son refused to step on Americans flag. They had American flag painted on the ground and they. Every morning they wanted the kids to go over it. And then I knew that this is not just because I loved America, just because it's not right to disrespect and force people to choose to disrespect a country. A flag or whatever it is. But in order for you to get to go to the next level, you have to follow their leads. And that was difficult. I got accepted. I took the test to become a teacher. Just like a GRE test in Iran. In Iran. And then I passed it with the. With flying. Yeah.\n\n[35:28] POURAN KHAVAR: With excellence.\n\n[35:29] AGGIE EBRAHIMI BAZAZ: With excellence. And then one day I was waiting for you guys to come home with your dad with food. Somebody knocked at the door, and the guy with the motorcycle came to see how I dress at home and where's my house and what we do at home. And when I opened the door without scarves, with the short sleeves, and he said that you passed with excellence. But you know that teachers are the role model of the children. I said, yeah, yeah. He said, do you think you're a law mother? I said, I can't be. And he said, no, you can't. Look at yourself. Look at the way you dress. You cannot be a role model. And furthermore, what you have studied is no good in Iran. You studied sociology, and sociology, you studied United States society, not Iran society. So you can teach in Iran. So I knew that this is a country that they left us, so I wanted to leave.\n"}, {"annotation_id": "2e9602a03af0492290fb17c46d9332db", "code_id": "8ea35f8aa5404f70b3601cc927cfb1b3", "code_name": "naming_and_identity", "code_color": "hsl(138 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 184, "end_line": 194, "anchor_status": "clean", "memo": "Meaning, uniqueness, and cross-cultural legibility of Aggies name", "exact_text": "[19:41] POURAN KHAVAR: So can you pronounce my name in Farsi?\n\n[19:47] AGGIE EBRAHIMI BAZAZ: Your name pronounces as agric and is equivalent to English word agate.\n\n[19:56] POURAN KHAVAR: So yeah, go ahead.\n\n[19:58] AGGIE EBRAHIMI BAZAZ: And that is a gemstone, is a very precious gemstone agate. And so is Iran too.\n\n[20:05] POURAN KHAVAR: Is that a very popular name in Iran?\n\n[20:07] AGGIE EBRAHIMI BAZAZ: No, it's not. I never heard anybody's name Arabic in Iran. No one had. I knew that when I was pregnant with you. I wanted the customary is that they choose. Most people choose the children's name to start with the same alphabets like VRPs my sisters. My brother starts with P. And I had Ali. So I was looking for a name that starts with this Alphabet A. And I came out with Asal means honey. But everybody else was naming it Asal. I wanted something unique. So I looked and look and I did wanted something I didn't know I'm going to move to United States that's going to be difficult to pronounce it. So I wanted something very, very unique and meaningful. So one day I was playing with my ring. I had a agic ring and I was reading one of the Hoffa is one of the most popular poets in Iran. One of the poems about array and how precious it is. So we had your. One of your cousins were very close to me. He was a religious guy. And I told him about Agir. And he said that I also asked them why you guys men were AGI ring in Iran. I asked him why you guys were ag ring. And he said that because you know that ag the gemstone was first found in the mountain that Prophet Muhammad would go for prey. I said oh, I thinking about name and now is a holy name too. So I chose that and I said oh, that that's going to be so beautiful because it has a meaning. Later on I found out that every culture claims to be the one who discovered earlier like Greek do they said that one of the goddess discovered that Italians do they think they found it on the shoreline of one of the Rivers and is mentioned in Bible a few times. And finally I thought well, if it's mentioned in Bible, it means that and it is a gemstone that they get it from the mountains. It. It develops in the caveats of the rocks and the mountain because has coats in it different course. So I said if that is maybe that prophet story is kind of true too. But when I moved here, I noticed that it's difficult to pronounce. I didn't care about Islam anymore, so. But the name was still beautiful and I love, I love your name.\n"}, {"annotation_id": "60d2081e407f4deea02dc0b92ba914f0", "code_id": "8ea35f8aa5404f70b3601cc927cfb1b3", "code_name": "naming_and_identity", "code_color": "hsl(138 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 216, "end_line": 234, "anchor_status": "clean", "memo": "Name pronunciation, transliteration, and preserving meaning after migration", "exact_text": "[25:06] POURAN KHAVAR: Well, what did you know that my name wouldn't be pronounceable in.\n\n[25:11] AGGIE EBRAHIMI BAZAZ: In the United States when I came here because for Americans they're not familiar with the Alphabet and even my last name. But we worked at it. I get or Aggie is very close to what it is. So we didn't totally change the name, your identity, but I knew it was going to be because you had your last name is a little bit difficult. But I remember in school whenever they were calling you to give you rewards, every grade they had the highest. I mean the hardest time to pronounce your name because they would see the spelling A G H I G H and they would hi AG hi or I should have probably changed it then to Aggie. But I didn't want to mess with your record, you know, I didn't want to mess it up for the. For the future. Future purposes.\n\n[26:11] POURAN KHAVAR: Right.\n\n[26:11] AGGIE EBRAHIMI BAZAZ: So.\n\n[26:12] POURAN KHAVAR: Because when we came over, you tried to write my name in English the way it sounds in Farsi. So you spelled it a G H.\n\n[26:18] AGGIE EBRAHIMI BAZAZ: I G H. Yeah. I mean that was your name. Yeah. Thinking that someone would make sense of it. I don't know.\n\n[26:26] POURAN KHAVAR: Right. Did it ever make you sad that people wouldn't know what the word meant or.\n\n[26:32] AGGIE EBRAHIMI BAZAZ: No, no. As understandable is they're not used to it. They are. They never been introduced to it. I was forcing something to them that was unfamiliar. So they tried. They were very, very nice. They tried, they did their best. They had hardest time to make sense of it and it was my fault. I should have spelled it from the beginning AGI, but that would take away your name from. I mean the meaning of that. So. But eventually that happened. So yeah, when you grow up, you change that. Yeah.\n\n[27:05] POURAN KHAVAR: But did you ever feel sad that the meaning would be lost here at least.\n\n[27:12] AGGIE EBRAHIMI BAZAZ: It was important to me that I know the meaning. And those around us who matters as a family, they knew that is Aggie. And those who would get close to you, you would explain to them. So it is easy, you know, it's easy fix if they don't know some people, they're just strangers. Doesn't matter my own name, I never change it, but it has been pronounced different ways. Never, ever bothers me. It is. Who is it the Shakespeare that says that what is in the name that rose with any other names still smells the same and looks the same. So a rose is a rose. Whatever you call it.\n"}, {"annotation_id": "259cd83cb0de47b59d59e9eb8725775e", "code_id": "fd29b87b2beb454d92c4f8f3d235c2c0", "code_name": "pre_revolution_modernity", "code_color": "hsl(147 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 9, "end_line": 15, "anchor_status": "clean", "memo": "Pre-revolution Iran remembered as prosperous, family-centered, and deeply connected", "exact_text": "[02:58] KATHY PURNELL: And what was it like to grow up as a child in Tehran?\n\n[03:03] BITA EDRAKI: Well, I lived in Iran during the heydays of Iran and pre revolution I had. And it's, you know, I lived in a middle class family that was a very loving and caring family where education and connectedness was of utmost importance, not only to my mom and dad and my brother, but to my extended family, my grandmother, my aunts, my uncles, my cousins. And we all grew up together.\n\n[03:48] KATHY PURNELL: And what was. What's. What's your earliest memory of growing up?\n\n[03:54] BITA EDRAKI: Not easy to answer. So my. I have many fond memories of growing up again. It's always centered around family get togethers. My brother and I obviously always getting into mischief together. We were 16 months apart. He's 16 months older than I am. And being excited about going to grandma's home because we knew everyone will be there. And we would get together with our cousins. I remember we would all pile up in one car. We refused to go in separate cars. And back then, there were laws of, you have to have seatbelts on. It would be 15. We were proud to say that there were 15 of us in Volkswagen Beetle, that we could then go far to grandma's house. So there was sense of, uh, being connected.\n"}, {"annotation_id": "8acf2d4c3fa54f21a2261b5bf9ea0c08", "code_id": "fd29b87b2beb454d92c4f8f3d235c2c0", "code_name": "pre_revolution_modernity", "code_color": "hsl(147 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 86, "end_line": 90, "anchor_status": "clean", "memo": "Tehran remembered as modern and globally respected under the Shah", "exact_text": "[00:59] AGGIE EBRAHIMI BAZAZ: Tehran was civilized up to the modern city when I was growing up and when we had Shah as the king and we often we were recognized by the entire world and our passport had one of the highest value in the passport index rates. We were compared to cities like Paris, New York. Tehran was Paris, New York and big metropolitan cities. And everything was 180 degrees different from what you see today in Iran or in Tehran.\n\n[01:59] POURAN KHAVAR: So did you enjoy growing up in Tehran?\n\n[02:02] AGGIE EBRAHIMI BAZAZ: We didn't know at the time that we supposed to enjoy it. And now we really look back and see how fortunate we were that we were growing up and the date that era that we had the king and we had all those comfort level of living there.\n"}, {"annotation_id": "e26aef32df9c4c9681ce913669403d05", "code_id": "46022921cddf4a01831ae6d2c8c377ed", "code_name": "revolutionary_disillusionment", "code_color": "hsl(315 68% 52%)", "document_path": "interview_two.txt", "scope_type": "span", "start_line": 77, "end_line": 83, "anchor_status": "clean", "memo": "Return visit around the revolution sharpens appreciation of freedoms and diaspora belonging in the US", "exact_text": "[21:15] KATHY PURNELL: When, when did you first start to feel at home, either in Saratoga or in the United States generally?\n\n[21:22] BITA EDRAKI: So in United States was after I actually went back to Iran, which was. The last time I visited Iran was before the revolution. It was the summer of 1978, and the uprisings were just beginning to happen. And I saw what I. When I came back to United States. And after the revolution, I realized the foresight of my father and how fortunate I was to be able to live in a place where I was not told how I need to dress, how I need to behave, that I had the freedom to choose what I wanted to study, where I wanted to go when I wanted to go, that I could drive, and that I had those freedoms.\n\n[22:17] KATHY PURNELL: So. Okay. So then what do you miss about Saratoga? What did you love the most about it? Or what did you miss? What do you miss the most about it?\n\n[22:28] BITA EDRAKI: I think it was when, again, it was the time that I found another home. It became home, of course, the weather in California, it's loved that. I loved the fact that I lived with my mom, dad and brother it was that sense of family. Back then, we had a beautiful home that was the center of. So once the iranian revolution happened, as you all know, it was a huge brain drain on Iran. Everybody that could immediately left. And there was a large population that came to the northern California Bay area. Again, as I mentioned, I am a Baha'I, and the Baha'I community sort of gelled together and supported each other in that respect. I remember having gatherings at our house every Friday night where it started with a few people. By the time I left in 1983, Washington, we had 70 people that would come every night and would gather together, and it would be. People would cook and, you know, they had a sense of belonging and a family. So that family was created.\n"}, {"annotation_id": "2452a944187340388e9e79f0dcd34837", "code_id": "46022921cddf4a01831ae6d2c8c377ed", "code_name": "revolutionary_disillusionment", "code_color": "hsl(315 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 172, "end_line": 174, "anchor_status": "clean", "memo": "Return to Iran after revolution, false promises, embassy crisis, and being trapped for nine years", "exact_text": "[12:12] POURAN KHAVAR: Can you just explain briefly? So you had my brother in Las Vegas and then I was born in Iran. So Katie, you explain what happened there.\n\n[12:20] AGGIE EBRAHIMI BAZAZ: Well, when we were in States, things were changing in Iran. And of course your dad was amongst those who was very active in changing regime in Iran. Shah had two major oppositions, religious leaders and leftist group, Marxist group. He was scared of Marxists and he would stop them, do everything to stop them in his power. But he wasn't scared of religious leaders and fundamentalists. So when we were here, we would go to the and they were very, very, very active. The religious groups were in United States and all over the world. They had meetings. They would gather young people like us and they would brainwash everybody. So we would go to these meetings. I would just go follow him, but he would go. And I could see that things are. We could see things were changing. And when we graduated, both of us graduated from University, University of Tulsa, the same. We graduated in May and in I think in few months before that Shah had left the country. So the regime was changed and we decided that. And by then my son was. Your brother was I think 6 years old, 79, 5 years old. So we decided that we go back and give it a try. Because now that Shaw has gone, everything is perfect. We thought or they told us everything is going to be perfect. There's going to be new society, new opportunities, new life. Everything is new. No prisoner, no political prisoners, no torture. Everybody has going to be prosperous. The oil money is going to be divided between everybody in Iran. Every thing Rosie picture they could picture for us. So we decided to gather our stuff, go back. I didn't want to go back, but he wanted because he studied petroleum chemical engineering and he thought that he's going to find a job in his field petroleum in Iran. So we went there in May and few months I wrote that on my description for them. A few months after we arrived in Iran we found out that nothing they have said was according to the truth. Everything was a lie. And that place is no place to be living and raising families. Everyone had gone. It was beginning of the revolution. Everything was changing so fast. They were Trying quote unquote clean everything. Starting from universities, workplaces. By cleaning they meant to get rid of people who were already there and bring the new ones who would believe their philosophy. And they stopped connecting with the outside world and they were isolated. The country was so it was getting bad, really bad. We decided that okay, let's go back and I pushed them to go and get the visa so we can go back, we can come back to States. And especially because I had a, I was accepted by Harvard to go for my master's degree. So I said let's go back and I want to go study. And he finally said okay. The day that he went to the embassy because by at charles time getting a visa would take only 48 hours for Iranians to get a visa to come to United States. And the same day that he went to the embassy to get, to renew our visa to come back and student visa to come back, it was the same day that they captured the hostages. So embassy was closed. So he called and he said that I'm here, everybody is climbing the walls on the embassy and the embassy is closed and I can't get the visa. And I started crying and I knew that something bad is going to happen. And he said, no, no, no, no, it's gonna, it's gonna be fine in few days. And we couldn't leave for nine years. So.\n"}, {"annotation_id": "65cca2b3eb9c43548a5992e3cd9cbe41", "code_id": "46022921cddf4a01831ae6d2c8c377ed", "code_name": "revolutionary_disillusionment", "code_color": "hsl(315 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 284, "end_line": 294, "anchor_status": "clean", "memo": "Explicit desire for regime change and safety to voice it only from the United States", "exact_text": "[37:16] POURAN KHAVAR: What's your dream for Iran in the future?\n\n[37:20] AGGIE EBRAHIMI BAZAZ: Regime change. Regime change. Regime change. Regime change.\n\n[37:26] POURAN KHAVAR: That can't be put on air.\n\n[37:28] AGGIE EBRAHIMI BAZAZ: No, no.\n\n[37:29] POURAN KHAVAR: Because don't they. Doesn't the Iranian government go after people who say that?\n\n[37:34] AGGIE EBRAHIMI BAZAZ: Yes, but they. This is not Iran. True. I came here so I can say these things.\n"}, {"annotation_id": "db1fcc488ca642bcbf1ffb4f15d55874", "code_id": "7fb3fa2070824da79f2065ce17cad6a5", "code_name": "single_motherhood_and_family_loss", "code_color": "hsl(331 68% 52%)", "document_path": "tehran.txt", "scope_type": "span", "start_line": 256, "end_line": 270, "anchor_status": "clean", "memo": "Single-parent strain and concern over children growing up without their father", "exact_text": "[30:49] POURAN KHAVAR: Well, there were a lot of challenges, but what were some of the hardest things about being a single parent here with two children in a totally different country without any family.\n\n[31:00] AGGIE EBRAHIMI BAZAZ: My biggest challenge was my kids growing up without a father. Doesn't matter where not having a father figure. Your dad told us that, oh, don't worry when you go there, most of the kids don't have father, have one family member, one parent, families and they would blend very well. Don't worry. And I never thought either myself or you guys going to blend and you didn't. It was difficult because my friends, my, I was in environment that most Iranians were and they were 99%, I mean 100% married with the children, I mean with the father and mother. And I hated to take you to those parties because of the look on you guys face when the fathers were around. And the most challenging things for me was my kids being deprived of having a father and the mother, two parents, family.\n\n[32:03] POURAN KHAVAR: Growing up, I don't remember ever caring about other kids fathers or thinking that they were.\n\n[32:09] AGGIE EBRAHIMI BAZAZ: Oh no. Oh, maybe it was in my mind. I don't Know, but you.\n\n[32:13] POURAN KHAVAR: You were so concerned about. Yeah, but I never felt. And those fathers were not people I would want as my father anyway.\n\n[32:20] AGGIE EBRAHIMI BAZAZ: No, not that you wanted those fathers. That. The feeling of that. See how that kids sitting on his father's or her father's lab and maybe it was on my mind, but it was always one of my regrets that why couldn't he. Just for the sake of children to be. To be around.\n\n[32:40] POURAN KHAVAR: Yeah. I think, you know, Ali and I always say that you did such a good job parenting us.\n\n[32:47] AGGIE EBRAHIMI BAZAZ: I hope so. I don't know. I'm not sure myself. But I'm happy how you guys turned out. I'm happy you did pursue your education. I'm happy you are successful and Ali is successful. I am. I thank God every night for you guys to be healthy, to know the right from wrong, and to always strive to do the right thing. I am. I'm blessed. And I won't change it for anything else.\n"}]};
    const state = {
      selectedCode: null,
      scope: "all",
      search: "",
    };

    const codeListEl = document.getElementById("code-list");
    const snippetListEl = document.getElementById("snippet-list");
    const summaryEl = document.getElementById("summary");
    const footerEl = document.getElementById("footer");
    const searchEl = document.getElementById("search");
    const scopeButtons = Array.from(document.querySelectorAll("[data-scope]"));

    function fmtCount(value, singular, plural) {
      return `${value} ${value === 1 ? singular : plural}`;
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function cardForCode(code) {
      const selected = state.selectedCode === code.code_id;
      const aliases = code.aliases.length ? `Aliases: ${code.aliases.join(", ")}` : "No aliases";
      return `
        <article class="code-card ${selected ? "is-selected" : ""}" data-code-id="${code.code_id}">
          <div class="code-top">
            <span class="swatch" style="background:${code.display_color}"></span>
            <div class="code-name">${escapeHtml(code.name)}</div>
          </div>
          <div class="code-meta">
            <span>${fmtCount(code.annotation_count, "annotation", "annotations")}</span>
            <span>${fmtCount(code.document_count, "document", "documents")}</span>
            <span>${escapeHtml(code.status)}</span>
          </div>
          <p class="code-description">${escapeHtml(code.description || aliases)}</p>
        </article>
      `;
    }

    function snippetCard(snippet) {
      const range = snippet.scope_type === "document"
        ? "Whole document"
        : `Lines ${snippet.start_line}-${snippet.end_line}`;
      const text = snippet.scope_type === "document"
        ? "<document-level annotation>"
        : escapeHtml(snippet.exact_text || "");
      const memo = snippet.memo ? `<p>${escapeHtml(snippet.memo)}</p>` : "";
      return `
        <article class="snippet">
          <div class="snippet-head">
            <div class="snippet-title">
              <span class="chip">
                <span class="swatch" style="background:${snippet.code_color}"></span>
                ${escapeHtml(snippet.code_name)}
              </span>
              <span class="scope-pill">${escapeHtml(snippet.scope_type)}</span>
            </div>
            <div class="snippet-meta">${escapeHtml(snippet.document_path)} · ${escapeHtml(range)} · ${escapeHtml(snippet.anchor_status)}</div>
          </div>
          <pre>${text}</pre>
          ${memo}
        </article>
      `;
    }

    function matchesSnippet(snippet) {
      if (state.selectedCode && snippet.code_id !== state.selectedCode) {
        return false;
      }
      if (state.scope !== "all" && snippet.scope_type !== state.scope) {
        return false;
      }
      if (!state.search) {
        return true;
      }
      const haystack = [
        snippet.code_name,
        snippet.document_path,
        snippet.memo || "",
        snippet.exact_text || "",
        snippet.anchor_status,
      ].join("\n").toLowerCase();
      return haystack.includes(state.search);
    }

    function renderSummary(snippets) {
      const activeCodes = state.selectedCode ? 1 : data.codes.length;
      const docs = new Set(snippets.map((snippet) => snippet.document_path));
      const conflicted = snippets.filter((snippet) => snippet.anchor_status === "conflicted").length;
      summaryEl.innerHTML = [
        ["Visible codes", activeCodes],
        ["Visible snippets", snippets.length],
        ["Visible documents", docs.size],
        ["Conflicted anchors", conflicted],
      ].map(([label, value]) => `
        <div class="stat">
          <p class="stat-label">${label}</p>
          <p class="stat-value">${value}</p>
        </div>
      `).join("");
    }

    function renderCodes() {
      codeListEl.innerHTML = data.codes.map(cardForCode).join("");
      for (const node of codeListEl.querySelectorAll(".code-card")) {
        node.addEventListener("click", () => {
          const codeId = node.getAttribute("data-code-id");
          state.selectedCode = state.selectedCode === codeId ? null : codeId;
          render();
        });
      }
    }

    function renderSnippets() {
      const filtered = data.snippets.filter(matchesSnippet);
      if (!filtered.length) {
        snippetListEl.innerHTML = `<div class="empty">No coded snippets match the current filters.</div>`;
      } else {
        snippetListEl.innerHTML = filtered.map(snippetCard).join("");
      }
      renderSummary(filtered);
      footerEl.textContent = `Generated from ${data.project_root} on ${data.generated_at}`;
    }

    function render() {
      scopeButtons.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.scope === state.scope);
      });
      renderCodes();
      renderSnippets();
    }

    searchEl.addEventListener("input", (event) => {
      state.search = event.target.value.trim().toLowerCase();
      renderSnippets();
    });

    for (const button of scopeButtons) {
      button.addEventListener("click", () => {
        state.scope = button.dataset.scope;
        render();
      });
    }

    document.getElementById("clear-filters").addEventListener("click", () => {
      state.selectedCode = null;
      state.scope = "all";
      state.search = "";
      searchEl.value = "";
      render();
    });

    render();
  </script>
</body>
</html>
